name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (runtime + test tooling, no GUI)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov ruff mypy
      - name: Lint (ruff — hard gate, must pass)
        run: ruff check .
      - name: Type check (mypy — hard gate, strict, must pass)
        run: mypy app
      - name: Tests + coverage
        run: pytest -q --cov=app --cov-report=term-missing

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory: surfaces CVEs without blocking merges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --strict || true
