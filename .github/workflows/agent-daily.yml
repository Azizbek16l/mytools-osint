name: bluetm-agent

on:
  schedule:
    - cron: "0 3 * * *"      # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write              # allow agent to push branches + PRs
  issues: write                # allow agent to file issues
  pull-requests: write

concurrency:
  group: bluetm-agent
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TELEGRAM_AGENT_BOT_TOKEN: ${{ secrets.TELEGRAM_AGENT_BOT_TOKEN }}
      TELEGRAM_AGENT_CHANNEL:   ${{ secrets.TELEGRAM_AGENT_CHANNEL }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}        # optional; empty = skipped
      OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}      # optional
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history so changelog_update can diff tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        run: |
          python -m agent.main

      - name: Upload agent run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-${{ github.run_id }}
          path: agent/data/
          if-no-files-found: ignore
          retention-days: 30
