id: password-reuse
name: Password reuse across multiple breached accounts
severity: high
description: |
  Surfaces hash entities reachable from >= 2 distinct emails via
  SEEN_IN_BREACH-adjacent paths. The presence of the same hash entity in
  multiple email subgraphs is the password-reuse signal.
match:
  password_reuse:
    min_emails: 2
output:
  title: "Password hash shared by {count} email accounts"
  evidence_field: emails
